spring:
  application:
    name: EcommerceTrie
  datasource:
    url: jdbc:postgresql://localhost:5432/trie_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

app:
  jwt:
    secret: ${JWT_SECRET:chave-secreta-muito-longa-com-mais-de-64-caracteres-para-jwt-hs256}
    expiration-ms: 86400000
  whatsapp:
    number: ${WHATSAPP_NUMBER:5511999999999}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
